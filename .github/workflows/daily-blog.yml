name: 일별 블로그 자동 생성

on:
  schedule:
    # 매주 월~금 오전 8시 (KST) = UTC 전날 23시
    # UTC 기준: 일~목 23:00
    - cron: '0 23 * * 0-4'
  workflow_dispatch:  # 수동 실행 (테스트용)

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Claude CLI 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 블로그 글 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_AUTO_APPROVE: "true"
        run: |
          chmod +x scripts/generate-daily-blog.sh
          bash scripts/generate-daily-blog.sh

      - name: 생성된 파일 확인
        id: check-files
        run: |
          # git 변경사항 확인
          CHANGED=$(git status --short output/ 2>/dev/null || echo "")
          [ -n "$CHANGED" ] && echo "has_new_files=true" >> $GITHUB_OUTPUT || echo "has_new_files=false" >> $GITHUB_OUTPUT

          # 생성 스크립트가 저장한 파일 경로 우선 참조
          BLOG_FILE=$(cat /tmp/blog_file_path.txt 2>/dev/null)
          echo "스크립트 기록 경로: $BLOG_FILE"

          # 없으면 find로 탐색
          if [ -z "$BLOG_FILE" ] || [ ! -s "$BLOG_FILE" ]; then
            BLOG_FILE=$(find output/ -name "*.md" -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | awk '{print $2}')
            echo "find 탐색 결과: $BLOG_FILE"
          fi

          echo "=== output/ 디렉토리 상태 ==="
          find output/ 2>/dev/null || echo "(output/ 없음)"
          echo "=== /tmp/blog_post.md 상태 ==="
          ls -lh /tmp/blog_post.md 2>/dev/null || echo "(없음)"

          # /tmp/blog_post.md (ASCII 이름 복사본) 사용
          if [ -f /tmp/blog_post.md ] && [ -s /tmp/blog_post.md ]; then
            echo "blog_file=/tmp/blog_post.md" >> $GITHUB_OUTPUT
            echo "✅ 첨부 파일: /tmp/blog_post.md ($(wc -c < /tmp/blog_post.md) bytes)"
          else
            echo "blog_file=" >> $GITHUB_OUTPUT
            echo "❌ 블로그 파일 없음"
          fi

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 커밋 및 푸시
        run: |
          git add output/
          if git diff --staged --quiet; then
            echo "새로 생성된 블로그 글이 없습니다."
          else
            TODAY=$(date '+%Y%m%d' -d '+9 hours')
            WEEKDAY=$(date '+%A' -d '+9 hours')
            git commit -m "auto: ${TODAY} ${WEEKDAY} 블로그 글 자동 생성"
            git push origin HEAD
          fi

      - name: 이메일 알림 (항상 실행)
        if: always()
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          pip3 show markdown -q 2>/dev/null || pip3 install markdown -q
          python3 - << 'PYEOF'
          import smtplib, os, re, markdown
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          status   = os.environ.get('JOB_STATUS', 'unknown')
          run_id   = os.environ.get('RUN_ID', '')
          repo     = os.environ.get('REPOSITORY', '')
          username = os.environ['MAIL_USERNAME']
          password = os.environ['MAIL_PASSWORD']
          to_addr  = os.environ['MAIL_TO']

          try:
              with open('/tmp/blog_post.md', 'r', encoding='utf-8') as f:
                  blog_content = f.read()
          except Exception as e:
              blog_content = f"[블로그 파일 없음: {e}]"

          prefix  = '✅' if status == 'success' else '❌'
          subject = f"{prefix} [블로그 자동화] {'오늘의 글 생성 완료' if status == 'success' else '글 생성 실패'}"

          log_url = f"https://github.com/{repo}/actions/runs/{run_id}"
          header_md = f"**상태:** {status}  \n**실행 ID:** {run_id}  \n**Actions 로그:** [{log_url}]({log_url})\n\n---\n\n"
          html_body = markdown.markdown(header_md + blog_content, extensions=['nl2br'])

          msg = MIMEMultipart('alternative')
          msg['Subject'] = subject
          msg['From']    = username
          msg['To']      = to_addr
          msg.attach(MIMEText(html_body, 'html', 'utf-8'))

          with smtplib.SMTP('smtp.gmail.com', 587) as s:
              s.ehlo()
              s.starttls()
              s.login(username, password)
              s.send_message(msg)
          print("이메일 전송 완료")
          PYEOF
