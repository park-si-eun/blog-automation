name: 일별 블로그 자동 생성

on:
  schedule:
    # 매주 월~금 오전 8시 (KST) = UTC 전날 23시
    # UTC 기준: 일~목 23:00
    - cron: '0 23 * * 0-4'
  workflow_dispatch:  # 수동 실행 (테스트용)

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Claude CLI 설치
        run: npm install -g @anthropic-ai/claude-code

      - name: 블로그 글 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_AUTO_APPROVE: "true"
        run: |
          chmod +x scripts/generate-daily-blog.sh
          bash scripts/generate-daily-blog.sh

      - name: 생성된 파일 확인
        id: check-files
        run: |
          echo "생성된 파일 목록:"
          CHANGED=$(git status --short output/ 2>/dev/null || echo "")
          echo "$CHANGED"
          if [ -n "$CHANGED" ]; then
            echo "has_new_files=true" >> $GITHUB_OUTPUT
            echo "file_list<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            # 새로 생성된 .md 파일 본문 읽기
            BLOG_FILE=$(git status --short output/ | grep '?? \|A ' | grep '\.md$' | awk '{print $2}' | head -1)
            if [ -z "$BLOG_FILE" ]; then
              BLOG_FILE=$(git diff --name-only --cached output/ | grep '\.md$' | head -1)
            fi
            if [ -n "$BLOG_FILE" ] && [ -f "$BLOG_FILE" ]; then
              echo "blog_file=$BLOG_FILE" >> $GITHUB_OUTPUT
              echo "blog_content<<BLOG_EOF" >> $GITHUB_OUTPUT
              cat "$BLOG_FILE" >> $GITHUB_OUTPUT
              echo "BLOG_EOF" >> $GITHUB_OUTPUT
            else
              echo "blog_content=글 파일을 찾을 수 없습니다." >> $GITHUB_OUTPUT
            fi
          else
            echo "has_new_files=false" >> $GITHUB_OUTPUT
            echo "file_list=변경된 파일 없음" >> $GITHUB_OUTPUT
            echo "blog_content=" >> $GITHUB_OUTPUT
          fi

      - name: Git 설정
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 커밋 및 푸시
        run: |
          git add output/
          if git diff --staged --quiet; then
            echo "새로 생성된 블로그 글이 없습니다."
          else
            TODAY=$(date '+%Y%m%d' -d '+9 hours')
            WEEKDAY=$(date '+%A' -d '+9 hours')
            git commit -m "auto: ${TODAY} ${WEEKDAY} 블로그 글 자동 생성"
            git push origin HEAD
          fi

      - name: 성공 이메일 알림
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ [블로그 자동화] 오늘의 글 생성 완료"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            블로그 글 자동 생성이 완료되었습니다.

            📅 날짜: ${{ github.run_id }} 실행
            🕗 시간: KST 오전 8시 자동 실행
            📄 파일: ${{ steps.check-files.outputs.blog_file }}

            ──────────────────────────────
            ${{ steps.check-files.outputs.blog_content }}
            ──────────────────────────────

            GitHub Actions 실행 결과:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: 실패 이메일 알림
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ [블로그 자동화] 오늘의 글 생성 실패"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            블로그 글 자동 생성 중 오류가 발생했습니다.

            📅 날짜: ${{ github.run_id }} 실행
            🕗 시간: KST 오전 8시 자동 실행

            오류 로그 확인:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            GitHub Actions 페이지에서 실패 원인을 확인해 주세요.
